
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Retirada de Pedido</title>

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        background-color: #2f3542;
        font-family: Arial, sans-serif;
        padding: 15px;
        color: #333;
    }

    .pedido {
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        max-width: 900px;
        margin: auto;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #f2c300;
        font-size: 22px;
    }

    .section {
        border-left: 4px solid #f2c300;
        padding-left: 12px;
        margin-bottom: 20px;
    }

    label {
        font-size: 13px;
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .row > div {
        flex: 1;
    }

    button {
        width: 100%;
        padding: 14px;
        background-color: #f2c300;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        font-size: 15px;
    }

    .btn-add {
        background-color: #2ed573;
    }

    .btn-voltar {
        background-color: #2f3542;
        color: #fff;
    }

    /* TABLET */
    @media (max-width: 768px) {
        .row {
            flex-direction: column;
        }
    }

    /* CELULAR */
    @media (max-width: 480px) {
        body {
            padding: 10px;
        }

        .pedido {
            padding: 12px;
        }

        h2 {
            font-size: 18px;
        }
    }
    </style>

    <script>
    function adicionarLinha() {
        let container = document.getElementById("linhas-artigos");

        let novaLinha = document.createElement("div");
        novaLinha.classList.add("row");

        novaLinha.innerHTML = `
            <div>
                <label>Artigo</label>
                <input name="artigo[]" placeholder="Ex: SKU123" required>
            </div>

            <div>
                <label>Qtd</label>
                <input type="number" name="qtd_retirada[]" min="1" required>
            </div>
        `;

        container.appendChild(novaLinha);
    }
    </script>

</head>

<body>

<div class="pedido">

    <h2>Retirada de Pedido</h2>

    <form action="/retirar" method="POST">

        <!-- IDENTIFICAÇÃO -->
        <div class="section">
            <label>Pedido</label>
            <input name="pedido" placeholder="Digite o pedido" required>

            <label>Endereço Atual</label>
            <input name="endereco_atual" placeholder="Ex: Rua A / Bloco 3" required>
        </div>

        <!-- ITENS -->
        <div class="section">
            <label>Itens para Retirada</label>

            <div id="linhas-artigos">
                <div class="row">
                    <div>
                        <label>Artigo</label>
                        <input name="artigo[]" required>
                    </div>

                    <div>
                        <label>Qtd</label>
                        <input type="number" name="qtd_retirada[]" min="1" required>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add" onclick="adicionarLinha()">
                + Adicionar Item
            </button>
        </div>

        <!-- RESPONSÁVEL -->
        <div class="section">
            <label>Responsável pela Retirada</label>
            <input name="responsavel_retirada" placeholder="Digite a chapa" required>
        </div>

        <!-- DADOS -->
        <div class="section">
            <div class="row">
                <div>
                    <label>Data</label>
                    <input type="date" name="data_retirada" required>
                </div>

                <div>
                    <label>Hora</label>
                    <input type="time" name="hora_retirada" required>
                </div>
            </div>

            <label>Destino</label>
            <select name="destino">
                <option>Separação</option>
                <option>Produção</option>
            </select>
        </div>

        <button type="submit">Confirmar Retirada</button>

    </form>

    <a href="/">
        <button type="button" class="btn-voltar">⬅ Menu</button>
    </a>

</div>

</body>
</html>
