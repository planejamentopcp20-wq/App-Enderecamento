<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- RESPONSIVIDADE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        background: linear-gradient(135deg, #2f3542, #1e272e);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 15px;
    }

    .box {
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h2 {
        text-align: center;
        color: #f2c300;
        margin-bottom: 20px;
        font-size: 22px;
    }

    label {
        font-size: 13px;
        font-weight: bold;
        color: #2f3542;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        transition: 0.3s;
        font-size: 14px;
    }

    input:focus {
        border-color: #f2c300;
        outline: none;
        box-shadow: 0 0 5px rgba(242,195,0,0.5);
    }

    button {
        width: 100%;
        padding: 14px;
        background: #f2c300;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        font-size: 15px;
    }

    button:hover {
        background: #d9ad00;
        transform: scale(1.02);
    }

    .erro {
        color: red;
        text-align: center;
        margin-top: 10px;
        font-size: 13px;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        color: #999;
    }

    /* TABLET */
    @media (max-width: 768px) {
        h2 {
            font-size: 20px;
        }
    }

    /* CELULAR */
    @media (max-width: 480px) {
        .box {
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            font-size: 18px;
        }

        input {
            padding: 11px;
            font-size: 13px;
        }

        button {
            padding: 13px;
            font-size: 14px;
        }
    }
    </style>
</head>

<body>

<div class="box">

    <h2>🔐 Login</h2>

    <form method="POST">

        <label>Usuário</label>
        <input name="usuario" placeholder="Digite seu usuário" required autocomplete="username">

        <label>Senha</label>
        <input type="password" name="senha" placeholder="Digite sua senha" required autocomplete="current-password">

        <button type="submit">Entrar</button>

    </form>

    {% if erro %}
        <div class="erro">{{ erro }}</div>
    {% endif %}

    <div class="footer">
        Sistema de Endereçamento
    </div>

</div>

</body>
</html>
